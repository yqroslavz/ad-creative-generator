type UserApiKeyPreview {
  provider: TextProvider!
  keyPreview: String!
  createdAt: DateTime!
  lastUsedAt: DateTime
}

input SaveApiKeyInput {
  provider: TextProvider!
  key: String!
}

extend type Query {
  myApiKeys: [UserApiKeyPreview!]!
}

extend type Mutation {
  saveApiKey(input: SaveApiKeyInput!): UserApiKeyPreview!
  deleteApiKey(provider: TextProvider!): Boolean!
}
