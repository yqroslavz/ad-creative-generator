enum GenerationStatus {
  PENDING
  RUNNING
  SUCCEEDED
  FAILED
}

enum TextProvider {
  GEMINI
  ANTHROPIC
  OPENAI
}

enum ImageMode {
  POLLINATIONS
  BYOK_DALLE
  SVG_FALLBACK
}

type Creative {
  id: ID!
  position: Int!
  headline: String!
  description: String!
  cta: String!
  imageUrl: String
  createdAt: DateTime!
}

type GenerationRequest {
  id: ID!
  projectId: ID!
  status: GenerationStatus!
  n: Int!
  textProviderUsed: TextProvider
  imageModeUsed: ImageMode
  error: String
  startedAt: DateTime
  finishedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
  creatives: [Creative!]!
}

input GenerateCreativesInput {
  projectId: ID!
  n: Int!
  textProvider: TextProvider
  imageMode: ImageMode
}

extend type Query {
  myGenerations(projectId: ID): [GenerationRequest!]!
  generationRequest(id: ID!): GenerationRequest
}

extend type Mutation {
  generateCreatives(input: GenerateCreativesInput!): GenerationRequest!
  regenerateCreative(creativeId: ID!): Creative!
  retryGeneration(id: ID!): GenerationRequest!
}
